name: Deploy to dothome

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inject dothome env (GitHub Variables)
        env:
          NAVER_MAP_CLIENT_ID: ${{ vars.VITE_NAVER_MAP_CLIENT_ID }}
        run: |
          if [ -z "$NAVER_MAP_CLIENT_ID" ]; then
            echo "::error::GitHub variable VITE_NAVER_MAP_CLIENT_ID is not set (Settings вҶ’ Secrets and variables вҶ’ Actions вҶ’ Variables)"
            exit 1
          fi
          sed -i "s/^VITE_NAVER_MAP_CLIENT_ID=.*/VITE_NAVER_MAP_CLIENT_ID=${NAVER_MAP_CLIENT_ID}/" preview/.env.dothome.example

      # OAuth л№„л°Җк°’мқҖ м ҖмһҘмҶҢм—җ л‘җм§Җ м•Ҡкі  л°°нҸ¬ мӢң .htaccess placeholderм—җ мЈјмһ…н•ңлӢӨ.
      - name: Inject OAuth secrets into public/.htaccess
        env:
          OAUTH_NAVER_CLIENT_ID: ${{ secrets.OAUTH_NAVER_CLIENT_ID }}
          OAUTH_NAVER_CLIENT_SECRET: ${{ secrets.OAUTH_NAVER_CLIENT_SECRET }}
          OAUTH_KAKAO_REST_API_KEY: ${{ secrets.OAUTH_KAKAO_REST_API_KEY }}
          OAUTH_KAKAO_CLIENT_SECRET: ${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          STUDY114_MAIL_PROBE_KEY: ${{ secrets.STUDY114_MAIL_PROBE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          htaccess=public/.htaccess
          required="OAUTH_NAVER_CLIENT_ID OAUTH_NAVER_CLIENT_SECRET OAUTH_KAKAO_REST_API_KEY OAUTH_KAKAO_CLIENT_SECRET OAUTH_GOOGLE_CLIENT_ID OAUTH_GOOGLE_CLIENT_SECRET"
          missing=0
          for v in $required; do
            if [ -z "${!v:-}" ]; then
              echo "::error::GitHub secret $v is not set (Settings вҶ’ Secrets and variables вҶ’ Actions вҶ’ Secrets)"
              missing=1
            fi
          done
          if [ "$missing" != "0" ]; then
            echo "::error::OAuth мӢңнҒ¬лҰҝ лҜём„Өм • вҖ” л°°нҸ¬ мӨ‘лӢЁ (placeholder .htaccess м—…лЎңл“ң л°©м§Җ)"
            exit 1
          fi
          # mail probe key лҜём„Өм • мӢң лһңлҚӨ (м ҖмһҘмҶҢВ·лЎңк·ём—җ лӮЁкё°м§Җ м•ҠмқҢ)
          if [ -z "${STUDY114_MAIL_PROBE_KEY:-}" ]; then
            STUDY114_MAIL_PROBE_KEY="probe_$(openssl rand -hex 12)"
          fi
          data="$(cat "$htaccess")"
          for v in $required STUDY114_MAIL_PROBE_KEY; do
            token="__${v}__"
            repl="${!v}"
            case "$data" in
              *"$token"*) ;;
              *) echo "::error::placeholder $token not found"; exit 1 ;;
            esac
            data="${data//"$token"/"$repl"}"
          done
          printf '%s\n' "$data" > "$htaccess"
          if grep -q '__OAUTH_\|__STUDY114_MAIL_PROBE_KEY__' "$htaccess"; then
            echo "::error::м№ҳнҷҳлҗҳм§Җ м•ҠмқҖ placeholderк°Җ лӮЁм•„ мһҲмҠөлӢҲлӢӨ."
            exit 1
          fi
          echo "OAuth SetEnv мЈјмһ… мҷ„лЈҢ (к°’мқҖ м¶ңл Ҙн•ҳм§Җ м•ҠмқҢ)."

      - name: Build for dothome
        run: pwsh -ExecutionPolicy Bypass -File scripts/build-dothome.ps1

      - name: Verify build output
        env:
          NAVER_MAP_CLIENT_ID: ${{ vars.VITE_NAVER_MAP_CLIENT_ID }}
        run: |
          test -f public/index.html
          js_file=$(ls public/assets/index-*.js | head -n 1)
          test -n "$js_file"
          grep -q "$NAVER_MAP_CLIENT_ID" "$js_file"

      - name: Deploy public/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: "112.175.184.80"
          username: "study114"
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: "/hosting/study114/html/"
          local-dir: "./public/"
          port: 21
          protocol: ftp

      # PHP м•ұмқҖ html/ нҳ•м ң src/ н•„мҡ” вҖ” public/л§Ң мҳ¬лҰ¬л©ҙ ProfileGenderSync л“ұ лҜёл°ҳмҳҒ
      - name: Deploy src/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: "112.175.184.80"
          username: "study114"
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: "/hosting/study114/src/"
          local-dir: "./src/"
          port: 21
          protocol: ftp
