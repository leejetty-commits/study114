name: Quarantine htaccess.bak

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/triggers/quarantine-htaccess-bak.run'

jobs:
  quarantine:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Preflight note
        run: |
          echo "Move only: html/.htaccess.bak -> _quarantine/.htaccess.bak"
          echo "Do NOT touch html/.htaccess"

      - name: FTP move to quarantine
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y lftp
          lftp -u "study114,${FTP_PASSWORD}" 112.175.184.80 <<'EOF'
          set ftp:passive-mode on
          set cmd:trace true
          cls -1
          cls -1 html || true
          cls -1 hosting/study114/html || true
          mkdir -f _quarantine
          mkdir -f hosting/study114/_quarantine
          mv -f html/.htaccess.bak _quarantine/.htaccess.bak
          bye
          EOF
          if ! lftp -u "study114,${FTP_PASSWORD}" 112.175.184.80 -e "set ftp:passive-mode on; cls -1 _quarantine/.htaccess.bak; bye" 2>/dev/null | grep -q htaccess; then
            echo "Attempt 1 failed, trying hosting/study114 paths..."
            lftp -u "study114,${FTP_PASSWORD}" 112.175.184.80 <<'EOF'
          set ftp:passive-mode on
          set cmd:fail-exit yes
          cd hosting/study114
          mkdir -f _quarantine
          mv -f html/.htaccess.bak _quarantine/.htaccess.bak
          ls -la _quarantine/.htaccess.bak
          bye
          EOF
          fi
          lftp -u "study114,${FTP_PASSWORD}" 112.175.184.80 -e "set ftp:passive-mode on; cls -1 _quarantine; cls -1 hosting/study114/_quarantine; bye"

      - name: Verify site (6 checks)
        run: |
          set -euo pipefail
          BASE="http://study114.dothome.co.kr"
          check() {
            local path="$1"
            local code
            code=$(curl -sS -o /dev/null -w "%{http_code}" "${BASE}${path}")
            echo "${path} -> ${code}"
            test "${code}" = "200"
          }
          check "/"
          check "/auth/"
          check "/search/"
          check "/register/room/"
          check "/register/tutor/"
          curl -sS "${BASE}/api/health/db.php" | tee /tmp/db.json
          grep -q '"ok":true' /tmp/db.json
          echo "All verification checks passed"
