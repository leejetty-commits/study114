# 로컬 개발용 MySQL 8 — study114_dev
# Usage:
#   docker compose -f docker/docker-compose.dev.yml up -d
#   .\scripts\apply-schema-dev.ps1

services:
  mysql:
    image: mysql:8.4
    container_name: study114-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: study114dev
      MYSQL_DATABASE: study114_dev
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - study114_mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pstudy114dev"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: study114-api-dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ..:/app
    ports:
      - "8080:8080"
    environment:
      STUDY114_DB_HOST: mysql
      STUDY114_DB_PORT: "3306"
      STUDY114_DB_NAME: study114_dev
      STUDY114_DB_USER: root
      STUDY114_DB_PASS: study114dev
      STUDY114_API_BASE: http://127.0.0.1:8080
      STUDY114_HOME_UI: http://127.0.0.1:5174
      STUDY114_AUTH_UI: http://127.0.0.1:5173
      # 소셜 로그인 — config/oauth.env.example 참고 후 값 설정
      OAUTH_NAVER_CLIENT_ID: ${OAUTH_NAVER_CLIENT_ID:-}
      OAUTH_NAVER_CLIENT_SECRET: ${OAUTH_NAVER_CLIENT_SECRET:-}
      OAUTH_KAKAO_REST_API_KEY: ${OAUTH_KAKAO_REST_API_KEY:-}
      OAUTH_KAKAO_CLIENT_SECRET: ${OAUTH_KAKAO_CLIENT_SECRET:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  study114_mysql_dev_data:
